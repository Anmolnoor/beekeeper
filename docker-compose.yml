services:
  redis:
    image: redis:7-alpine
    container_name: beehive-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  temporal:
    image: temporalio/server:latest
    container_name: beehive-temporal
    restart: on-failure
    entrypoint:
      - temporal
      - server
      - start-dev
      - --namespace=default
      - --db-filename=/tmp/sqlite/temporal.db
      - --ip=0.0.0.0
    tmpfs:
      - /tmp/sqlite
    ports:
      - "7233:7233"
      - "8233:8233"

  qdrant:
    image: qdrant/qdrant:latest
    container_name: beehive-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  searxng:
    image: searxng/searxng:latest
    container_name: beehive-searxng
    ports:
      - "8080:8080"
    environment:
      BASE_URL: http://localhost:8080/
      INSTANCE_NAME: beehive-searxng
    healthcheck:
      test: ["CMD", "wget", "-qO", "-", "http://localhost:8080/"]
      interval: 10s
      timeout: 5s
      retries: 20

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: beehive-celery-worker
    command: ["celery", "-A", "beehive.celery_app.celery_app", "worker", "--loglevel=INFO"]
    environment:
      BEEHIVE_CELERY_BROKER_URL: redis://redis:6379/0
      BEEHIVE_CELERY_BACKEND_URL: redis://redis:6379/1
      BEEHIVE_HONEYCOMB_ROOT: /app/runtime/honeycomb
      BEEHIVE_VECTOR_BACKEND: qdrant
      BEEHIVE_VECTOR_COLLECTION: honeycomb_memory
      BEEHIVE_VECTOR_URL: http://qdrant:6333
      BEEHIVE_LLM_PROVIDER: ${BEEHIVE_LLM_PROVIDER:-ollama}
      BEEHIVE_OLLAMA_BASE_URL: ${BEEHIVE_OLLAMA_BASE_URL:-http://100.99.106.59:11434}
      BEEHIVE_OLLAMA_MODEL: ${BEEHIVE_OLLAMA_MODEL:-catsarethebest/qwen2.5-N2:1.5b}
      BEEHIVE_SEARXNG_BASE_URL: ${BEEHIVE_SEARXNG_BASE_URL:-http://searxng:8080}
      BEEHIVE_TEMPORAL_ENDPOINT: temporal:7233
      BEEHIVE_TEMPORAL_NAMESPACE: default
      BEEHIVE_TEMPORAL_TASK_QUEUE: beehive-queue
    volumes:
      - honeycomb_data:/app/runtime/honeycomb
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      searxng:
        condition: service_started

  temporal-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: beehive-temporal-worker
    command: ["python", "-m", "beehive.temporal_worker"]
    restart: unless-stopped
    environment:
      BEEHIVE_CELERY_BROKER_URL: redis://redis:6379/0
      BEEHIVE_CELERY_BACKEND_URL: redis://redis:6379/1
      BEEHIVE_HONEYCOMB_ROOT: /app/runtime/honeycomb
      BEEHIVE_VECTOR_BACKEND: qdrant
      BEEHIVE_VECTOR_COLLECTION: honeycomb_memory
      BEEHIVE_VECTOR_URL: http://qdrant:6333
      BEEHIVE_LLM_PROVIDER: ${BEEHIVE_LLM_PROVIDER:-ollama}
      BEEHIVE_OLLAMA_BASE_URL: ${BEEHIVE_OLLAMA_BASE_URL:-http://100.99.106.59:11434}
      BEEHIVE_OLLAMA_MODEL: ${BEEHIVE_OLLAMA_MODEL:-catsarethebest/qwen2.5-N2:1.5b}
      BEEHIVE_SEARXNG_BASE_URL: ${BEEHIVE_SEARXNG_BASE_URL:-http://searxng:8080}
      BEEHIVE_TEMPORAL_ENDPOINT: temporal:7233
      BEEHIVE_TEMPORAL_NAMESPACE: default
      BEEHIVE_TEMPORAL_TASK_QUEUE: beehive-queue
    volumes:
      - honeycomb_data:/app/runtime/honeycomb
    depends_on:
      temporal:
        condition: service_started
      qdrant:
        condition: service_started
      searxng:
        condition: service_started

  pulse:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: beehive-pulse
    command: ["python", "-m", "beehive.runner", "pulse", "--interval", "2", "--honeycomb-root", "/app/runtime/honeycomb"]
    environment:
      BEEHIVE_HONEYCOMB_ROOT: /app/runtime/honeycomb
      BEEHIVE_LLM_PROVIDER: ${BEEHIVE_LLM_PROVIDER:-ollama}
      BEEHIVE_OLLAMA_BASE_URL: ${BEEHIVE_OLLAMA_BASE_URL:-http://100.99.106.59:11434}
      BEEHIVE_OLLAMA_MODEL: ${BEEHIVE_OLLAMA_MODEL:-catsarethebest/qwen2.5-N2:1.5b}
      BEEHIVE_SEARXNG_BASE_URL: ${BEEHIVE_SEARXNG_BASE_URL:-http://searxng:8080}
    volumes:
      - honeycomb_data:/app/runtime/honeycomb
    depends_on:
      redis:
        condition: service_healthy
      searxng:
        condition: service_started

  queen-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: beehive-queen-api
    command: ["python", "-m", "queen_api.app"]
    ports:
      - "8788:8788"
    environment:
      BEEHIVE_HONEYCOMB_ROOT: /app/runtime/honeycomb
      BEEHIVE_SCHEDULER_BACKEND: inline
      BEEHIVE_VECTOR_BACKEND: qdrant
      BEEHIVE_VECTOR_URL: http://qdrant:6333
      BEEHIVE_VECTOR_COLLECTION: honeycomb_memory
      BEEHIVE_LLM_PROVIDERS: ${BEEHIVE_LLM_PROVIDERS:-gemini,ollama}
      BEEHIVE_LLM_PROVIDER: ${BEEHIVE_LLM_PROVIDER:-ollama}
      BEEHIVE_GEMINI_API_KEY: ${BEEHIVE_GEMINI_API_KEY:-}
      BEEHIVE_GEMINI_MODEL: ${BEEHIVE_GEMINI_MODEL:-gemini-1.5-flash}
      BEEHIVE_OLLAMA_BASE_URL: ${BEEHIVE_OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      BEEHIVE_OLLAMA_MODEL: ${BEEHIVE_OLLAMA_MODEL:-catsarethebest/qwen2.5-N2:1.5b}
      BEEHIVE_SEARXNG_BASE_URL: ${BEEHIVE_SEARXNG_BASE_URL:-http://searxng:8080}
    volumes:
      - honeycomb_data:/app/runtime/honeycomb
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      temporal:
        condition: service_started
      qdrant:
        condition: service_started
      searxng:
        condition: service_started

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: beehive-open-webui
    ports:
      - "3000:8080"
    environment:
      OLLAMA_BASE_URL: ${BEEHIVE_OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    volumes:
      - open_webui_data:/app/backend/data
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  qdrant_data:
  honeycomb_data:
  open_webui_data:
