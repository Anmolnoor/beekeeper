services:
  redis:
    image: redis:7-alpine
    container_name: beehive-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  temporal:
    image: temporalio/server:latest
    container_name: beehive-temporal
    restart: on-failure
    entrypoint:
      - temporal
      - server
      - start-dev
      - --namespace=default
      - --db-filename=/tmp/sqlite/temporal.db
      - --ip=0.0.0.0
    tmpfs:
      - /tmp/sqlite
    ports:
      - "7233:7233"
      - "8233:8233"

  qdrant:
    image: qdrant/qdrant:latest
    container_name: beehive-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  searxng:
    image: searxng/searxng:latest
    container_name: beehive-searxng
    ports:
      - "8080:8080"
    environment:
      BASE_URL: http://localhost:8080/
      INSTANCE_NAME: beehive-searxng
    healthcheck:
      test: ["CMD", "wget", "-qO", "-", "http://localhost:8080/search?format=json&q=beehive"]
      interval: 10s
      timeout: 5s
      retries: 20

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: beehive-celery-worker
    command: ["celery", "-A", "beehive.celery_app.celery_app", "worker", "--loglevel=INFO"]
    environment:
      BEEHIVE_CELERY_BROKER_URL: redis://redis:6379/0
      BEEHIVE_CELERY_BACKEND_URL: redis://redis:6379/1
      BEEHIVE_HONEYCOMB_ROOT: /app/runtime/honeycomb
      BEEHIVE_VECTOR_BACKEND: qdrant
      BEEHIVE_VECTOR_COLLECTION: honeycomb_memory
      BEEHIVE_VECTOR_URL: http://qdrant:6333
      BEEHIVE_OLLAMA_BASE_URL: ${BEEHIVE_OLLAMA_BASE_URL:-http://100.99.106.59:11434}
      BEEHIVE_SEARXNG_BASE_URL: ${BEEHIVE_SEARXNG_BASE_URL:-http://searxng:8080}
      BEEHIVE_TEMPORAL_ENDPOINT: temporal:7233
      BEEHIVE_TEMPORAL_NAMESPACE: default
      BEEHIVE_TEMPORAL_TASK_QUEUE: beehive-queue
    volumes:
      - honeycomb_data:/app/runtime/honeycomb
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      searxng:
        condition: service_started

  temporal-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: beehive-temporal-worker
    command: ["python", "-m", "beehive.temporal_worker"]
    restart: unless-stopped
    environment:
      BEEHIVE_CELERY_BROKER_URL: redis://redis:6379/0
      BEEHIVE_CELERY_BACKEND_URL: redis://redis:6379/1
      BEEHIVE_HONEYCOMB_ROOT: /app/runtime/honeycomb
      BEEHIVE_VECTOR_BACKEND: qdrant
      BEEHIVE_VECTOR_COLLECTION: honeycomb_memory
      BEEHIVE_VECTOR_URL: http://qdrant:6333
      BEEHIVE_OLLAMA_BASE_URL: ${BEEHIVE_OLLAMA_BASE_URL:-http://100.99.106.59:11434}
      BEEHIVE_SEARXNG_BASE_URL: ${BEEHIVE_SEARXNG_BASE_URL:-http://searxng:8080}
      BEEHIVE_TEMPORAL_ENDPOINT: temporal:7233
      BEEHIVE_TEMPORAL_NAMESPACE: default
      BEEHIVE_TEMPORAL_TASK_QUEUE: beehive-queue
    volumes:
      - honeycomb_data:/app/runtime/honeycomb
    depends_on:
      temporal:
        condition: service_started
      qdrant:
        condition: service_started
      searxng:
        condition: service_started

volumes:
  qdrant_data:
  honeycomb_data:
